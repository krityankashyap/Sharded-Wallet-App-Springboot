dataSources:
  shardwallet1:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://localhost:3306/shardwallet1
    username: root
    password: aA@888888

  shardwallet2:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://localhost:3306/shardwallet2
    username: root
    password: aA@888888

rules:
- !SHARDING
  tables:
    users:
      actualDataNodes: shardwallet$->{1..2}.users
      databaseStrategy:
        standard:
          shardingColumn: id
          shardingAlgorithmName: database_inline
      keyGenerateStrategy:
        column: id
        keyGeneratorName: snowflake

    wallet:
      actualDataNodes: shardwallet$->{1..2}.wallet
      databaseStrategy:
        standard:
          shardingColumn: id
          shardingAlgorithmName: database_inline
      keyGenerateStrategy:
        column: id
        keyGeneratorName: snowflake    

    transaction:
      actualDataNodes: shardwallet$->{1..2}.transaction
      databaseStrategy:
        standard:
          shardingColumn: id
          shardingAlgorithmName: database_inline
      keyGenerateStrategy:
        column: id
        keyGeneratorName: snowflake    

    saga_instance:
      actualDataNodes: shardwallet$->{1..2}.saga_instance
      databaseStrategy:
        standard:
          shardingColumn: id
          shardingAlgorithmName: database_inline
      keyGenerateStrategy:
        column: id
        keyGeneratorName: snowflake    

    saga_step:
      actualDataNodes: shardwallet$->{1..2}.saga_step
      databaseStrategy:
        standard:
          shardingColumn: id
          shardingAlgorithmName: database_inline
      keyGenerateStrategy:
        column: id
        keyGeneratorName: snowflake    

  defaultDatabaseStrategy:
    standard:
      shardingColumn: id
      shardingAlgorithmName: database_inline

  shardingAlgorithms:
    database_inline:
      type: INLINE
      props:
        algorithm-expression: shardwallet$->{id % 2 + 1}

  keyGenerators:
    snowflake:
      type: SNOWFLAKE
