datasources:
  shardwallet1:
    jdbc-url: jdbc:mysql://localhost:3306/shardwallet1
    username: root
    password: aA@888888
    driver-class-name: com.mysql.cj.jdbc.Driver
    datasource-class-name: com.zaxxer.hikari.HikariDataSource

  shaedwallet2:
    jdbc-url: jdbc:mysql://localhost:3306/shardwallet2 
    username: root
    password: aA@888888
    driver-class-name: com.mysql.cj.jdbc.Driver
    datasource-class-name: com.zaxxer.hikari.HikariDataSource


rules:
 -!SHARDING
   defaultDatabaseStrategy:
     standard:
       shardingColumn: id
       shardingAlgorithmName: database_inline
  tables:
    user:
     actualDataNodes: shardwallet$->{1..2}.user_$->{0..1}
     databaseStrategy:
       standard:
         shardingColumn: id
         shardingAlgorithmName: database_inline  
      keyGenerateStrategy:
        column: id
        keyGeneratorName: snowflake
         
      
      shardingAlgorithms:
        database_inline:
          type: INLINE
          props:
            algorithm-expression: shardwallet$->{id % 2 + 1}

      
      keyGenerator:
        snowflake:
          type: SNOWFLAKE
          
